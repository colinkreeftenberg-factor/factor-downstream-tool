<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FACTOR_EU — Swap &amp; Shortage Applications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --carbon:#141414; --natural:#F1F1EA; --natural-2:#E7E6DC;
    --saffron:#FFC800; --line:#D9D7C9;
    --radius:22px; --radius-sm:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--natural); color:var(--carbon); font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif; -webkit-font-smoothing:antialiased;}

  /* HERO */
  .hero{
    position:relative; background:var(--carbon); color:var(--natural);
    overflow:hidden; padding:0;
  }
  .hero-inner{
    max-width:1120px; margin:0 auto; display:grid; grid-template-columns:1.05fr 0.95fr;
    align-items:center; gap:40px; padding:64px 32px;
  }
  .hero-logo{width:44px;height:44px;border-radius:11px;overflow:hidden;margin-bottom:28px;}
  .hero-logo img{width:100%;height:100%;display:block;object-fit:cover;}
  .hero-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#9a998f;margin-bottom:14px;}
  .hero-title{
    font-weight:800; font-size:56px; letter-spacing:-0.02em; line-height:1.02; margin:0;
    border-bottom:6px solid var(--saffron); display:inline-block; padding-bottom:8px;
  }
  .hero-subtitle{font-size:18px; font-weight:500; color:#c9c8bd; margin:20px 0 0; max-width:420px; line-height:1.5;}
  .hero-desc{font-size:13.5px; color:#8a897d; margin-top:16px; max-width:420px; line-height:1.6;}
  .hero-photo{
    position:relative; border-radius:var(--radius); overflow:hidden; aspect-ratio:4/3.1;
    background:#e9ddcf;
  }
  .hero-photo img{width:100%;height:100%;object-fit:cover;display:block;}

  @media (max-width: 860px){
    .hero-inner{grid-template-columns:1fr; padding:48px 24px;}
    .hero-title{font-size:40px;}
    .hero-photo{order:-1;}
  }

  /* TOOLS SECTION */
  .wrap{max-width:1120px;margin:0 auto;padding:56px 32px 96px;}
  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:10px;}
  .section-title{font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#5b5b54;}
  .section-count{font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:#8a897d;}

  .tool-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:18px;}
  @media (max-width: 860px){.tool-grid{grid-template-columns:1fr;}}

  .tool-card{
    background:#FBFBF7; border:1px solid var(--line); border-radius:var(--radius);
    padding:26px; display:flex; flex-direction:column; gap:14px; text-decoration:none; color:inherit;
    transition:.15s border-color, .15s transform, .15s box-shadow;
    position:relative; overflow:hidden;
  }
  .tool-card:hover{border-color:var(--carbon); transform:translateY(-2px); box-shadow:0 10px 24px rgba(20,20,20,0.08);}
  .tool-card::after{
    content:'→'; position:absolute; top:24px; right:26px; font-size:18px; color:#c9c7ba;
    transition:.15s color, .15s transform;
  }
  .tool-card:hover::after{color:var(--carbon); transform:translateX(3px);}
  .tool-index{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#9a998f; letter-spacing:.04em;}
  .tool-name{font-size:18px; font-weight:800; letter-spacing:-0.01em; max-width:85%;}
  .tool-desc{font-size:13px; color:#5b5b54; line-height:1.55; max-width:90%;}
  .tool-tags{display:flex; gap:6px; flex-wrap:wrap; margin-top:auto;}
  .tag{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.03em;
    background:var(--natural-2); border:1px solid var(--line); color:#5b5b54;
    padding:3px 9px; border-radius:999px;
  }

  .add-card{
    border:1.5px dashed #c9c7ba; border-radius:var(--radius); padding:26px;
    display:flex; flex-direction:column; align-items:flex-start; justify-content:center; gap:6px;
    color:#9a998f; font-size:13px; min-height:100%;
  }
  .add-card .plus{font-size:22px; font-weight:700; color:#c9c7ba;}

  footer{margin-top:56px; font-size:11.5px; color:#9b9a8f; text-align:center;}
  a.quiet{color:inherit; text-decoration:underline; text-underline-offset:2px;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div>
      <div class="hero-logo"><img src="assets/logo.png" alt="Factor logo" /></div>
      <div class="hero-eyebrow">Internal Ops Tooling</div>
      <h1 class="hero-title">FACTOR_EU</h1>
      <div class="hero-subtitle">Swap &amp; Shortage Applications</div>
      <div class="hero-desc">A small suite of tools to turn production incident data into customer-ready comms exports — across BNL, DE, SE and DK.</div>
    </div>
    <div class="hero-photo"><img src="assets/hero.png" alt="Factor meal box" /></div>
  </div>
</div>

<div class="wrap">
  <div class="section-head">
    <div class="section-title">Tools</div>
    <div class="section-count" id="toolCount"></div>
  </div>
  <div class="tool-grid" id="toolGrid"></div>

  <footer>Factor · internal tools · made &amp; maintained by <strong>Colin Kreeftenberg</strong> — questions, edits or new tools go to him.</footer>
</div>

<script>
/* =================================================================
   TOOLS — add a new tool by adding one object here. Nothing else
   on this page needs to change.
================================================================= */
const TOOLS = [
  {
    name: "BNL CRM Tool- NL/BE",
    description: "Swap & shortage export tool for the Dutch and Belgian market.",
    href: "tools/bnl-crm-tool.html",
    tags: ["NL", "BE", "FR-BE"]
  },
  {
    name: "VE CRM Tool — DE/SE/DK",
    description: "Swap & shortage export tool for the German and Nordics markets.",
    href: "tools/de-se-dk-tool.html",
    tags: ["DE", "SE", "DK"]
  },
  {
    name: "Swap & Shortage Fulfilment Manager",
    description: "Operational manager for tracking and resolving swap & shortage incidents end to end.",
    href: "tools/swap-shortage-manager.html",
    tags: ["Ops"]
  }
];

function renderTools(){
  const grid = document.getElementById('toolGrid');
  document.getElementById('toolCount').textContent = TOOLS.length + (TOOLS.length === 1 ? ' tool' : ' tools');
  grid.innerHTML = TOOLS.map((t, i) => `
    <a class="tool-card" href="${t.href}">
      <div class="tool-index">${String(i+1).padStart(2,'0')}</div>
      <div class="tool-name">${t.name}</div>
      <div class="tool-desc">${t.description}</div>
      <div class="tool-tags">${t.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
    </a>
  `).join('') + `
    <div class="add-card">
      <div class="plus">+</div>
      <div>New tools show up here — just add an entry to the <code>TOOLS</code> list in this page.</div>
    </div>
  `;
}
renderTools();
</script>

</body>
</html>
